    var PBKDF2_ITERATIONS = 200000;
    var STORAGE_KEY = "projects_pw";

    function b64ToBytes(b64) {
      var bin = atob(b64);
      var bytes = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }

    async function decrypt(password) {
      var raw = b64ToBytes(ENCRYPTED_PAYLOAD);
      var salt = raw.slice(0, 16);
      var iv = raw.slice(16, 28);
      var data = raw.slice(28);

      var enc = new TextEncoder();
      var keyMaterial = await crypto.subtle.importKey(
        "raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveKey"]
      );
      var key = await crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: salt, iterations: PBKDF2_ITERATIONS, hash: "SHA-256" },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
      var plainBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, data);
      return new TextDecoder().decode(plainBuf);
    }

    function reveal(html) {
      document.getElementById("gate").style.display = "none";
      var c = document.getElementById("content");
      c.innerHTML = html;
      c.style.display = "block";
    }

    async function tryUnlock(password, remember) {
      try {
        var html = await decrypt(password);
        if (remember) {
          try { sessionStorage.setItem(STORAGE_KEY, password); } catch (e) {}
        }
        reveal(html);
        return true;
      } catch (e) {
        return false;
      }
    }

    document.getElementById("gate-form").addEventListener("submit", async function (ev) {
      ev.preventDefault();
      var pw = document.getElementById("pw").value;
      var err = document.getElementById("err");
      err.textContent = "";
      var ok = await tryUnlock(pw, true);
      if (!ok) {
        err.textContent = "Incorrect password.";
        document.getElementById("pw").select();
      }
    });

    // Auto-unlock within the same browser session if already entered.
    (async function () {
      try {
        var saved = sessionStorage.getItem(STORAGE_KEY);
        if (saved) { await tryUnlock(saved, false); }
      } catch (e) {}
    })();
  </script>
